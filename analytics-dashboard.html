<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Gold Hunter Analytics</title><link rel="icon" href="/favicon.ico"><style>
:root{color-scheme:dark;--g:#e2bd55;--bg:#060606;--card:#101010;--mut:#9a9386}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 15% 0,#2a210c 0,transparent 28%),var(--bg);color:#f5f1e7;font:14px/1.5 Inter,Arial,sans-serif}.wrap{max-width:1280px;margin:auto;padding:24px 16px 70px}.head{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}.brand{display:flex;align-items:center;gap:13px}.brand img{width:52px}.brand h1{margin:0;font-size:clamp(25px,4vw,40px)}.brand p{margin:2px 0;color:var(--mut)}select,input,button{background:#111;color:#fff;border:1px solid #302a1b;border-radius:10px;padding:10px 12px}button{background:var(--g);color:#0a0802;font-weight:800;cursor:pointer}.toolbar{display:flex;gap:8px;align-items:center}.grid{display:grid;gap:12px}.stats{grid-template-columns:repeat(5,1fr);margin:20px 0}.card{background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.02));border:1px solid rgba(226,189,85,.2);border-radius:18px;padding:16px}.stat b{display:block;font-size:29px;color:#f0ce6a}.stat span,.sub{color:var(--mut);font-size:12px}.two{grid-template-columns:1fr 1fr}.three{grid-template-columns:1.1fr 1fr 1fr;margin-top:12px}h2{font-size:16px;margin:0 0 12px}.row{display:grid;grid-template-columns:minmax(100px,1fr) 70px 70px;gap:8px;padding:9px 0;border-top:1px solid #222}.row:first-of-type{border-top:0}.bar{height:7px;background:#252525;border-radius:9px;overflow:hidden;margin-top:6px}.bar i{display:block;height:100%;background:linear-gradient(90deg,#8d6e20,var(--g));border-radius:9px}.chart{height:190px;display:flex;align-items:end;gap:7px;padding-top:12px}.col{flex:1;min-width:8px;background:linear-gradient(#f0cf6d,#6f5415);border-radius:5px 5px 0 0;position:relative}.col:hover:after{content:attr(data-tip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#000;padding:5px 7px;border-radius:6px;white-space:nowrap;font-size:11px}.login{max-width:460px;margin:12vh auto}.error{color:#ff9f82}.funnel .step{padding:10px 12px;margin:7px 0;background:#15130d;border-left:3px solid var(--g);border-radius:8px;display:flex;justify-content:space-between}.foot{color:#777;margin-top:16px;font-size:11px}@media(max-width:900px){.stats{grid-template-columns:1fr 1fr}.two,.three{grid-template-columns:1fr}}@media(max-width:480px){.stats{grid-template-columns:1fr 1fr}.stat b{font-size:22px}.toolbar{width:100%}.toolbar>*{flex:1}}
</style></head><body><main class="wrap"><section id="login" class="login card"><div class="brand"><img src="/assets/logo.png"><div><h1>Analytics Dashboard</h1><p>输入 Cloudflare DASHBOARD_KEY</p></div></div><input id="key" type="password" placeholder="Dashboard access key" style="width:100%;margin:18px 0 9px"><button id="enter" style="width:100%">进入 Dashboard</button><p id="loginMsg" class="error"></p></section><section id="app" hidden><header class="head"><div class="brand"><img src="/assets/logo.png"><div><h1>Gold Hunter Analytics</h1><p>访客来源、WhatsApp 转换与用户行为</p></div></div><div class="toolbar"><select id="days"><option value="1">今天</option><option value="7" selected>最近 7 天</option><option value="30">最近 30 天</option><option value="90">最近 90 天</option></select><button id="refresh">刷新</button></div></header><div id="status" class="sub"></div><section class="grid stats"><div class="card stat"><b id="users">—</b><span>活跃用户</span></div><div class="card stat"><b id="sessions">—</b><span>Sessions</span></div><div class="card stat"><b id="wa">—</b><span>WhatsApp Key events</span></div><div class="card stat"><b id="rate">—</b><span>WhatsApp 转化率</span></div><div class="card stat"><b id="duration">—</b><span>平均停留时间</span></div></section><section class="grid two"><div class="card"><h2>访客与转换趋势</h2><div id="trend" class="chart"></div></div><div class="card funnel"><h2>行为漏斗</h2><div id="funnel"></div></div></section><section class="grid three"><div class="card"><h2>流量来源</h2><div id="sources"></div></div><div class="card"><h2>WhatsApp 按钮位置</h2><div id="buttons"></div></div><div class="card"><h2>设备</h2><div id="devices"></div></div></section><section class="grid two" style="margin-top:12px"><div class="card"><h2>国家</h2><div id="countries"></div></div><div class="card"><h2>热门页面</h2><div id="pages"></div></div></section><p class="foot">数据来自 Google Analytics Data API。报表可能比 Realtime 延迟数小时。此页面已设 noindex。</p></section></main><script>
const $=id=>document.getElementById(id),fmt=n=>new Intl.NumberFormat().format(Math.round(n||0)),esc=s=>String(s||'(not set)').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));let key=sessionStorage.getItem('ghDashKey')||'';
function list(id,rows,label=0,a=0,b=1){const max=Math.max(1,...rows.map(x=>x.m[a]));$(id).innerHTML=rows.map(x=>`<div class="row"><div>${esc(x.d[label])}<div class="bar"><i style="width:${x.m[a]/max*100}%"></i></div></div><b>${fmt(x.m[a])}</b><span>${b===null?'':fmt(x.m[b])}</span></div>`).join('')||'<p class="sub">暂无数据</p>'}
async function load(){ $('status').textContent='读取 GA4 数据中…'; const r=await fetch('/api/analytics?days='+$('days').value,{headers:{'x-dashboard-key':key}}),j=await r.json();if(!r.ok||!j.ok)throw Error(j.error||'读取失败');const m=j.summary.m,u=m[0],sessions=m[1],keys=m[3];$('users').textContent=fmt(u);$('sessions').textContent=fmt(sessions);$('wa').textContent=fmt(keys);$('rate').textContent=(u?keys/u*100:0).toFixed(1)+'%';$('duration').textContent=Math.round(m[4]||0)+'s';list('sources',j.source,0,0,2);list('buttons',j.buttons,0,0,null);list('devices',j.device,0,0,1);list('countries',j.country,0,0,1);list('pages',j.pages,0,0,2);const ev=Object.fromEntries(j.events.map(x=>[x.d[0],x.m[0]]));const order=['session_start','scroll','section_view','gallery_open','video_play','whatsapp_click'];$('funnel').innerHTML=order.map(n=>`<div class="step"><span>${n}</span><b>${fmt(ev[n]||0)}</b></div>`).join('');const max=Math.max(1,...j.daily.map(x=>x.m[0]));$('trend').innerHTML=j.daily.map(x=>`<i class="col" style="height:${Math.max(4,x.m[0]/max*100)}%" data-tip="${x.d[0]} · ${fmt(x.m[0])} users / ${fmt(x.m[1])} key events"></i>`).join('');$('status').textContent='最后更新：'+new Date(j.generatedAt).toLocaleString();}
async function enter(){key=$('key').value.trim();sessionStorage.setItem('ghDashKey',key);try{await load();$('login').hidden=true;$('app').hidden=false}catch(e){$('loginMsg').textContent=e.message}}
$('enter').onclick=enter;$('refresh').onclick=()=>load().catch(e=>$('status').textContent=e.message);$('days').onchange=$('refresh').onclick;if(key){$('key').value=key;enter()}
</script></body></html>
