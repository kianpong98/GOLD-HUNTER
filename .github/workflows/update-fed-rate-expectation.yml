name: Update CME FedWatch probabilities (official-first)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature/news-engine
    paths:
      - '.github/workflows/update-fed-rate-expectation.yml'
      - 'scripts/update_fed_rate_expectation.py'
      - 'functions/api/rate-expectation-engine.js'
  schedule:
    # Every 30 minutes on weekdays. The script commits only when official
    # probabilities change, plus one six-hour freshness checkpoint.
    - cron: '7,37 * * * 1-5'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install official-data reader
        run: pip install requests

      - name: Read, validate, and checkpoint CME FedWatch
        env:
          CME_FEDWATCH_ACCESS_TOKEN: ${{ secrets.CME_FEDWATCH_ACCESS_TOKEN }}
          CME_FEDWATCH_API_URL: ${{ secrets.CME_FEDWATCH_API_URL }}
        run: python scripts/update_fed_rate_expectation.py

      - name: Validate website snapshot
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          p='assets/data/rate-expectation.json'
          d=json.load(open(p,encoding='utf-8'))
          rows=d.get('outcomes',[])
          assert len(rows)>=2, 'Need at least two official target-rate outcomes'
          total=round(sum(float(x['probability']) for x in rows),1)
          assert 98.5<=total<=101.5, f'Invalid probability total: {total}'
          assert d.get('source') in {'CME FedWatch','CME FedWatch verified snapshot'}
          assert d.get('kvWrite') is False
          assert d.get('meetingDate') and d.get('currentTargetRange')
          assert d.get('githubChecked') is True, 'GitHub heartbeat was not recorded'
          assert d.get('sourceMode') in {'official-github-sync','github-verified-fallback','verified-static-fallback'}, d.get('sourceMode')
          print('FedWatch validation passed:', d['meetingDate'], d['currentTargetRange'], rows, 'total', total)
          PY

      - name: Upload CME diagnostic when a run fails
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fedwatch-debug-${{ github.run_id }}
          path: artifacts/fedwatch-debug/
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit only verified changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/rate-expectation.json
          if git diff --cached --quiet; then
            echo "CME probabilities unchanged. No commit needed."
            exit 0
          fi
          git commit -m "Update CME FedWatch probabilities"
          BRANCH="${GITHUB_REF_NAME}"
          for attempt in 1 2 3 4 5; do
            git fetch origin "$BRANCH"
            git rebase "origin/$BRANCH"
            if git push origin "HEAD:$BRANCH"; then exit 0; fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 2))
          done
          exit 1
