name: Watch official Actual releases

on:
  workflow_dispatch:
    inputs:
      event_types:
        description: 'Optional comma-separated event types for recovery (blank = current release window)'
        required: false
        default: ''
      force_poll:
        description: 'Run the long poll even outside the normal release window'
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write

concurrency:
  group: official-release-watcher-${{ github.ref }}
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install updater dependency
        run: pip install requests

      - name: Detect official release window and expected periods
        id: window
        shell: bash
        env:
          INPUT_TYPES: ${{ inputs.event_types || '' }}
          FORCE_POLL: ${{ inputs.force_poll || false }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timedelta, timezone

          with open('data/generated-events.json', encoding='utf-8') as handle:
              events = json.load(handle)

          now = datetime.now(timezone.utc)
          requested = {x.strip() for x in os.environ.get('INPUT_TYPES', '').split(',') if x.strip()}
          force_poll = os.environ.get('FORCE_POLL', '').lower() == 'true'
          active = []
          for event in events:
              event_type = str(event.get('type') or '').strip()
              period = str(event.get('releasePeriod') or '').strip()
              raw_datetime = str(event.get('datetime') or '').strip()
              if not event_type or not period or not raw_datetime:
                  continue
              try:
                  release = datetime.fromisoformat(raw_datetime).astimezone(timezone.utc)
              except ValueError:
                  continue
              in_window = release - timedelta(minutes=15) <= now <= release + timedelta(minutes=90)
              recovery_due = release <= now <= release + timedelta(days=3)
              if (requested and event_type in requested and (force_poll or recovery_due)) or (not requested and in_window):
                  active.append(event)

          by_type = {}
          for event in sorted(active, key=lambda item: item['datetime']):
              by_type[str(event['type']).strip()] = str(event['releasePeriod']).strip()
          active_types = sorted(by_type)
          expected = ','.join(f'{key}={by_type[key]}' for key in active_types)
          long_poll = bool(active_types) and (force_poll or any(
              datetime.fromisoformat(event['datetime']).astimezone(timezone.utc) - timedelta(minutes=15)
              <= now <=
              datetime.fromisoformat(event['datetime']).astimezone(timezone.utc) + timedelta(minutes=90)
              for event in active
          ))

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f"active={'true' if active_types else 'false'}\n")
              output.write(f"long_poll={'true' if long_poll else 'false'}\n")
              output.write(f"types={','.join(active_types)}\n")
              output.write(f"expected={expected}\n")

          print('UTC now:', now.isoformat())
          print('Selected event types:', active_types or ['all supported types (single background check)'])
          print('Required release periods:', expected or 'none')
          PY

      - name: Check official sources and require the correct release period
        id: poll
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          ACTIVE_TYPES: ${{ steps.window.outputs.types }}
          EXPECTED_PERIODS: ${{ steps.window.outputs.expected }}
          ACTIVE_WINDOW: ${{ steps.window.outputs.active }}
          LONG_POLL: ${{ steps.window.outputs.long_poll }}
        shell: bash
        run: |
          set -euo pipefail

          attempts=1
          delay=0
          if [ "$LONG_POLL" = "true" ]; then
            attempts=30
            delay=20
          fi

          rm -f /tmp/official-poll-status.json
          verified=false
          last_rc=0

          for attempt in $(seq 1 "$attempts"); do
            echo "Official source check ${attempt}/${attempts}"
            args=(--status-file /tmp/official-poll-status.json)
            if [ -n "$ACTIVE_TYPES" ]; then args+=(--types "$ACTIVE_TYPES"); fi
            if [ -n "$EXPECTED_PERIODS" ]; then args+=(--expected-periods "$EXPECTED_PERIODS"); fi

            set +e
            python scripts/update_official_data.py "${args[@]}"
            rc=$?
            set -e
            last_rc=$rc
            cat /tmp/official-poll-status.json 2>/dev/null || true

            if [ "$rc" -eq 0 ]; then
              verified=true
              echo "Correct official period verified."
              break
            fi

            if [ "$attempt" -lt "$attempts" ]; then
              echo "Target period is not available yet or the connector is temporarily unavailable; retrying in ${delay}s."
              sleep "$delay"
            fi
          done

          if [ "$verified" != "true" ]; then
            echo "The expected Actual release was not verified after ${attempts} checks."
            exit "${last_rc:-1}"
          fi

          if ! git diff --quiet -- data/official-data.json; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New verified official value detected."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Verified value already exists in the repository snapshot."
          fi

      - name: Commit only verified changed values
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/official-data.json

          if git diff --cached --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "No official value changed; existing snapshot and KV remain untouched."
            exit 0
          fi

          git commit -m "Update verified official Actual release"
          BRANCH="${GITHUB_REF_NAME}"
          for attempt in 1 2 3 4 5; do
            git fetch origin "$BRANCH"
            if git rebase "origin/$BRANCH" && git push origin "HEAD:$BRANCH"; then
              echo "committed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 2))
          done
          echo "Failed to push verified official data after 5 attempts."
          exit 1

      - name: Publish proof — verify the live website received every Actual
        if: steps.window.outputs.active == 'true'
        env:
          SITE_URL: https://goldhunter.site
          EXPECTED_PERIODS: ${{ steps.window.outputs.expected }}
          ADMIN_PIN: ${{ secrets.GH_ADMIN_PIN }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, os, time, urllib.request

          expected = dict(
              part.split('=', 1) for part in os.environ.get('EXPECTED_PERIODS', '').split(',') if '=' in part
          )
          if not expected:
              print('No active release requires publish proof.')
              raise SystemExit(0)

          site = os.environ['SITE_URL'].rstrip('/')
          admin_pin = os.environ.get('ADMIN_PIN', '')
          last_error = ''
          for attempt in range(1, 31):
              try:
                  stamp = int(time.time())
                  with urllib.request.urlopen(f'{site}/data/official-data.json?proof={stamp}', timeout=25) as response:
                      snapshot = json.load(response)
                  metrics = snapshot.get('metrics') or {}
                  snapshot_missing = [
                      f'{kind} expected {period}, got {(metrics.get(kind) or {}).get("period") or "none"}'
                      for kind, period in expected.items()
                      if (metrics.get(kind) or {}).get('period') != period or not str((metrics.get(kind) or {}).get('actual') or '').strip()
                  ]
                  if snapshot_missing:
                      raise RuntimeError('Static snapshot not deployed: ' + '; '.join(snapshot_missing))

                  request = urllib.request.Request(
                      f'{site}/api/data-engine?publishProof={stamp}',
                      headers={'cache-control': 'no-cache', **({'x-admin-pin': admin_pin} if admin_pin else {})},
                  )
                  with urllib.request.urlopen(request, timeout=30) as response:
                      payload = json.load(response)
                  rows = payload.get('events') or []
                  index = {(str(row.get('type')), str(row.get('releasePeriod'))): row for row in rows}
                  live_missing = []
                  for kind, period in expected.items():
                      row = index.get((kind, period))
                      if not row or not str(row.get('actual') or '').strip():
                          live_missing.append(f'{kind} [{period}]')
                  if not live_missing:
                      print('PUBLISH PROOF PASS:', ', '.join(f'{kind}={period}' for kind, period in expected.items()))
                      raise SystemExit(0)
                  last_error = 'Website API still missing Actual: ' + ', '.join(live_missing)
              except Exception as exc:
                  last_error = str(exc)
              print(f'Publish proof {attempt}/30 waiting: {last_error}')
              time.sleep(20)
          raise SystemExit('PUBLISH PROOF FAILED after 10 minutes: ' + last_error)
          PY
