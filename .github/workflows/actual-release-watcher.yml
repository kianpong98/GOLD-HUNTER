name: Watch official Actual releases

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write

concurrency:
  group: official-release-watcher-${{ github.ref }}
  cancel-in-progress: true

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 9
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Detect official release window
        id: window
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone, timedelta

          events=json.load(open('data/generated-events.json',encoding='utf-8'))
          now=datetime.now(timezone.utc)
          active=[]
          for event in events:
              try:
                  release=datetime.fromisoformat(event['datetime']).astimezone(timezone.utc)
              except Exception:
                  continue
              if event.get('releasePeriod') and release-timedelta(minutes=15) <= now <= release+timedelta(minutes=90):
                  active.append(event)

          types=sorted({str(x.get('type') or '').strip() for x in active if x.get('type')})
          with open(os.environ['GITHUB_OUTPUT'],'a',encoding='utf-8') as output:
              output.write('active='+('true' if types else 'false')+'\n')
              output.write('types='+','.join(types)+'\n')
          print('UTC now:', now.isoformat())
          print('Active official releases:', types)
          PY

      - name: Poll official sources
        id: poll
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          ACTIVE_TYPES: ${{ steps.window.outputs.types }}
          ACTIVE_WINDOW: ${{ steps.window.outputs.active }}
        shell: bash
        run: |
          set -euo pipefail
          attempts=1
          delay=0
          types=""
          if [ "$ACTIVE_WINDOW" = "true" ]; then
            attempts=12
            delay=20
            types="$ACTIVE_TYPES"
          fi

          source_failures=0
          for attempt in $(seq 1 "$attempts"); do
            echo "Official source check ${attempt}/${attempts}; types=${types:-all}"
            args=(--status-file poll-status.json)
            if [ -n "$types" ]; then args+=(--types "$types"); fi

            if python scripts/update_official_data.py "${args[@]}"; then
              source_failures=0
            else
              source_failures=$((source_failures + 1))
              echo "Official poll failed (${source_failures}/${attempts})."
            fi

            if ! git diff --quiet -- data/official-data.json; then
              echo "New verified official value detected."
              break
            fi
            [ "$attempt" = "$attempts" ] || sleep "$delay"
          done

          if [ "$source_failures" = "$attempts" ]; then
            echo "Every official poll failed."
            cat poll-status.json 2>/dev/null || true
            exit 1
          fi

      - name: Publish poll summary
        if: always()
        shell: bash
        run: |
          if [ -s poll-status.json ]; then
            echo '## Official release poll' >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat poll-status.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit only verified changed values
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/official-data.json
          if git diff --cached --quiet; then
            echo "No official value changed; existing snapshot and KV remain untouched."
            exit 0
          fi
          git commit -m "Update verified official Actual release"
          BRANCH="${GITHUB_REF_NAME}"
          for attempt in 1 2 3 4 5; do
            git fetch origin "$BRANCH"
            if git rebase "origin/$BRANCH" && git push origin "HEAD:$BRANCH"; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 2))
          done
          exit 1
