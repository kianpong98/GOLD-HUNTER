name: Watch official Actual releases

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write

concurrency:
  group: official-release-watcher-${{ github.ref }}
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Detect active official release window
        id: window
        run: |
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone, timedelta
          e=json.load(open('data/generated-events.json',encoding='utf-8')); now=datetime.now(timezone.utc)
          active=[]
          for x in e:
              try:r=datetime.fromisoformat(x['datetime']).astimezone(timezone.utc)
              except:continue
              if x.get('releasePeriod') and r-timedelta(minutes=10)<=now<=r+timedelta(minutes=90): active.append(x)
          routine = now.minute % 30 < 5
          with open(os.environ['GITHUB_OUTPUT'],'a') as f:
              f.write('active='+('true' if active else 'false')+'\n')
              f.write('routine='+('true' if routine else 'false')+'\n')
          print('Active releases:', [x.get('type') for x in active])
          print('24-hour connector check:', routine)
          PY
      - name: Check official sources without writing Workers KV
        if: steps.window.outputs.active == 'true' || steps.window.outputs.routine == 'true'
        run: |
          POLLS=1
          [ "${{ steps.window.outputs.active }}" = "true" ] && POLLS=24
          for attempt in $(seq 1 "$POLLS"); do
            echo "Official source poll ${attempt}/${POLLS}"
            python scripts/update_official_data.py || true
            if ! git diff --quiet -- data/official-data.json; then
              echo "New official data detected."
              break
            fi
            [ "$attempt" = "$POLLS" ] || sleep 25
          done
      - name: Commit new Actual only when changed
        if: steps.window.outputs.active == 'true' || steps.window.outputs.routine == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/official-data.json
          if git diff --cached --quiet; then echo "Actual not published yet; next run will retry."; exit 0; fi
          git commit -m "Update official Actual release"
          BRANCH="${GITHUB_REF_NAME}"
          for attempt in 1 2 3 4 5; do
            git fetch origin "$BRANCH"
            git rebase "origin/$BRANCH"
            if git push origin "HEAD:$BRANCH"; then exit 0; fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 2))
          done
          exit 1
