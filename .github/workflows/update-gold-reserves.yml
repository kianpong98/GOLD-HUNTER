name: Update central bank gold reserves

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature/news-engine
    paths:
      - '.github/workflows/update-gold-reserves.yml'
      - 'scripts/update_gold_reserves.py'
  schedule:
    # World Gold Council / IMF gold reserves data is published monthly, so a
    # daily check is more than enough to catch it within a day of release.
    - cron: '5 1 * * *'

permissions:
  contents: write

concurrency:
  group: gold-reserves-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Sync official IMF gold reserves data
        run: python scripts/update_gold_reserves.py

      - name: Validate output
        run: |
          python - <<'PY'
          import json
          p = 'assets/data/gold-reserves.json'
          d = json.load(open(p, encoding='utf-8'))
          rows = d.get('records', [])
          assert rows, 'No gold reserve records were generated'
          assert all(r.get('country') and r.get('holdingsTonnes') for r in rows)
          print('Gold reserve records:', len(rows), '- top holder:', rows[0])
          PY

      - name: Commit updated reserves
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/gold-reserves.json
          git diff --cached --quiet || git commit -m "Update central bank gold reserves"
          git push origin HEAD:${{ github.ref_name }}
