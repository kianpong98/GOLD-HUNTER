name: Update SPDR GLD holdings
on:
  workflow_dispatch:
  schedule:
    - cron: '30 23 * * 1-5'
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests openpyxl
      - run: python scripts/update_etf_holdings.py
      - name: Commit updated holdings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/spdr-gld-holdings.json
          git diff --cached --quiet || git commit -m "Update SPDR GLD holdings"
          git push
