name: Update SPDR GLD holdings

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature/news-engine
    paths:
      - '.github/workflows/update-etf-holdings.yml'
      - 'scripts/update_etf_holdings.py'
  schedule:
    # Runs at 07:00 Malaysia time, Tuesday through Saturday.
    # Malaysia is UTC+8, so 07:00 MYT = 23:00 UTC on the PREVIOUS calendar day.
    # Therefore MYT Tue-Sat 07:00 maps to UTC Mon-Fri 23:00 (day-of-week -1).
    # SPDR publishes each trading day's holdings with ~1 day lag, so a Malaysia
    # Tue-Sat morning run lines up with Monday-Friday official data becoming
    # available (Sat morning MYT picks up Friday's number).
    - cron: '0 23 * * 1-5'

permissions:
  contents: write

concurrency:
  group: spdr-etf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Download official SPDR archive
        run: python scripts/update_etf_holdings.py

      - name: Validate output
        run: |
          python - <<'PY'
          import json
          p='assets/data/spdr-gld-holdings.json'
          d=json.load(open(p,encoding='utf-8'))
          rows=d.get('records',[])
          assert rows, 'No ETF records were generated'
          assert len(rows) <= 30
          print('ETF records:',len(rows),'latest:',rows[-1])
          PY

      - name: Commit updated holdings
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/spdr-gld-holdings.json
          if git diff --cached --quiet; then
            echo "No holdings changes."
            exit 0
          fi
          git commit -m "Update SPDR GLD holdings"
          BRANCH="${GITHUB_REF_NAME}"
          # Retry against concurrent pushes from the other scheduled workflows
          # (quotes, schedule, etc.) that commit to the same branch. Without this
          # a simultaneous push causes "remote rejected ... fetch first".
          for attempt in 1 2 3 4 5; do
            git fetch origin "$BRANCH"
            git rebase "origin/$BRANCH" || git rebase --abort
            if git push origin "HEAD:$BRANCH"; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            sleep $((attempt * 3))
          done
          echo "Failed to push after retries."
          exit 1
