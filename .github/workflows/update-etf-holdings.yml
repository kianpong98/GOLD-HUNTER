name: Update SPDR GLD holdings

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature/news-engine
    paths:
      - '.github/workflows/update-etf-holdings.yml'
      - 'scripts/update_etf_holdings.py'
  schedule:
    - cron: '30 23 * * 1-5'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Download official SPDR archive
        run: python scripts/update_etf_holdings.py

      - name: Validate output
        run: |
          python - <<'PY'
          import json
          p='assets/data/spdr-gld-holdings.json'
          d=json.load(open(p,encoding='utf-8'))
          rows=d.get('records',[])
          assert rows, 'No ETF records were generated'
          assert len(rows) <= 30
          print('ETF records:',len(rows),'latest:',rows[-1])
          PY

      - name: Commit updated holdings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/spdr-gld-holdings.json
          if git diff --cached --quiet; then echo "No ETF changes."; exit 0; fi
          git commit -m "Update SPDR GLD holdings"
          BRANCH="${GITHUB_REF_NAME}"
          for attempt in 1 2 3 4 5; do
            git fetch origin "$BRANCH"
            git rebase "origin/$BRANCH"
            if git push origin "HEAD:$BRANCH"; then exit 0; fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 2))
          done
          exit 1
