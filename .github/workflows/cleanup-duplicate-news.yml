name: Cleanup duplicate news

on:
  schedule:
    - cron: '37 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cleanup-news-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Fetch deduplicated live events
        shell: bash
        run: |
          set -euo pipefail
          curl -fL --retry 4 --retry-all-errors --retry-delay 5 \
            --connect-timeout 20 --max-time 180 \
            -o live-events.json "https://goldhunter.site/api/market-events?cleanup=$(date +%s)"

      - name: Verify unique event keys
        run: |
          python - <<'PY'
          import json
          d=json.load(open('live-events.json',encoding='utf-8'))
          events=d.get('events') or []
          seen=set(); duplicates=[]
          for e in events:
              typ=str(e.get('type','')).strip().lower()
              # Fed speeches can legitimately occur more than once per day; exact time keeps them separate.
              stamp=str(e.get('datetime','')) if typ=='fed_speech' else str(e.get('releasePeriod') or e.get('datetime',''))[:10]
              key=(typ,stamp)
              if key in seen: duplicates.append(key)
              seen.add(key)
          assert events, 'No events returned by market engine'
          assert not duplicates, f'Duplicates remain in live output: {duplicates[:10]}'
          json.dump({'events':events},open('clean-events.json','w',encoding='utf-8'),ensure_ascii=False,separators=(',',':'))
          print(f'Unique live events: {len(events)}')
          PY

      - name: Persist clean list when GitHub ADMIN_PIN secret is configured
        env:
          ADMIN_PIN: ${{ secrets.ADMIN_PIN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ADMIN_PIN:-}" ]; then
            echo "GitHub secret ADMIN_PIN is not configured; live output is already deduplicated, so KV cleanup was skipped."
            exit 0
          fi
          code=$(curl -L --silent --show-error --output save-response.json --write-out "%{http_code}" \
            --retry 4 --retry-all-errors --retry-delay 5 --connect-timeout 20 --max-time 180 \
            -X POST "https://goldhunter.site/api/market-events" \
            -H "content-type: application/json" \
            -H "x-admin-pin: ${ADMIN_PIN}" \
            --data-binary @clean-events.json)
          cat save-response.json
          test "$code" = "200"
