name: Update quote cache

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature/news-engine
    paths:
      - '.github/workflows/update-quotes-cache.yml'
      - 'scripts/update_quotes.py'
      - 'data/quotes.json'
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write

concurrency:
  group: quote-cache-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Update delayed quote cache
        run: python scripts/update_quotes.py
      - name: Commit quote cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/quotes.json
          git diff --cached --quiet || git commit -m "Update quote cache"
          git push origin HEAD:${{ github.ref_name }}
