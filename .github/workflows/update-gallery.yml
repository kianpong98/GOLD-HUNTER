name: Update gallery manifests

on:
  push:
    paths:
      - 'assets/results/**'
      - 'assets/reviews/**'

permissions:
  contents: write

jobs:
  update-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate manifests
        run: |
          node scripts/generate-gallery-manifest.js

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/results/manifest.json assets/reviews/manifest.json
          git diff --cached --quiet || git commit -m "Update gallery manifests"
          git push
