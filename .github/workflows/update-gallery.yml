name: Update gallery manifests

on:
  push:
    paths:
      - 'assets/results/**'
      - 'assets/reviews/**'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate manifests
        run: |
          node scripts/generate-gallery-manifest.js

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/results/manifest.json assets/reviews/manifest.json
          if git diff --cached --quiet; then echo "No gallery changes."; exit 0; fi
          git commit -m "Update gallery manifests"
          BRANCH="${GITHUB_REF_NAME:-main}"
          for attempt in 1 2 3 4 5; do
            git fetch origin "$BRANCH"
            git rebase "origin/$BRANCH"
            if git push origin "HEAD:$BRANCH"; then exit 0; fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 2))
          done
          exit 1
