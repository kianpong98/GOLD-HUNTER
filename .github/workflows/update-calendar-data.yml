name: Update official economic data

on:
  workflow_dispatch:
  push:
    branches: [main, feature/news-engine]
    paths:
      - '.github/workflows/update-calendar-data.yml'
      - 'scripts/update_official_data.py'
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write

concurrency:
  group: official-economic-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Refresh verified official data
        run: python scripts/update_official_data.py
      - name: Validate data and ten-release history
        run: |
          python - <<'PY'
          import json
          d=json.load(open('data/official-data.json',encoding='utf-8'))
          required=['cpi_yoy','core_cpi_yoy','ppi_yoy','core_ppi_yoy','nfp','unemployment','avg_hourly_earnings','retail_sales','jobless_claims','gdp','pce','core_pce','fomc']
          ready=[]
          for key in required:
              metric=d.get('metrics',{}).get(key,{})
              if metric.get('actual'):
                  ready.append(key)
                  history=metric.get('history') or []
                  assert len(history)<=10
                  assert all(x.get('period') and x.get('actual') for x in history)
          assert ready, 'No official metrics available'
          print('Ready:', ', '.join(ready))
          PY
      - name: Commit only when official values changed
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/official-data.json
          if git diff --cached --quiet; then echo "No official data changes."; exit 0; fi
          git commit -m "Update verified official economic data"
          BRANCH="${GITHUB_REF_NAME}"
          for attempt in 1 2 3 4 5; do
            git fetch origin "$BRANCH"
            git rebase "origin/$BRANCH"
            if git push origin "HEAD:$BRANCH"; then exit 0; fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 2))
          done
          exit 1
