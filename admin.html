<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="robots" content="noindex,nofollow"><title>Gold Hunter Forecast Admin</title><link rel="icon" href="/favicon.ico"><link rel="stylesheet" href="style.css"><style>
.admin-shell{min-height:100vh;background:#050505;color:#f4f0e7;padding:24px 14px 70px}.admin-wrap{max-width:900px;margin:auto}.admin-brand{display:flex;align-items:center;gap:12px;margin-bottom:24px}.admin-brand img{width:50px;height:50px;object-fit:contain}.admin-brand h1{font-size:clamp(25px,7vw,42px);margin:0}.admin-panel{border:1px solid rgba(218,180,77,.28);background:rgba(255,255,255,.035);border-radius:20px;padding:16px;margin:14px 0}.admin-login{display:grid;gap:12px;max-width:420px}.admin-input{width:100%;box-sizing:border-box;background:#0d0d0d;border:1px solid rgba(255,255,255,.14);color:#fff;border-radius:12px;padding:13px;font:inherit}.admin-label{display:grid;gap:6px;color:#cfc8b8;font-size:12px}.admin-event{padding:14px;border:1px solid rgba(255,255,255,.09);border-radius:16px;background:#090909;margin:10px 0}.admin-event-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}.admin-event-head strong{color:#f4d472}.zh{display:block;color:#999;font-size:12px;margin-top:3px}.admin-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.locked{background:#111;color:#aaa}.admin-actions{position:sticky;bottom:10px;display:flex;padding:10px;background:rgba(5,5,5,.9);backdrop-filter:blur(12px);border-radius:15px;z-index:10}.admin-button{width:100%;border:1px solid rgba(218,180,77,.55);background:#d5ad43;color:#090909;border-radius:12px;padding:13px;font-weight:800}.admin-status{min-height:24px;color:#dbbc63;margin-top:8px}.admin-note{color:#aca596;font-size:13px}.admin-editor[hidden],.admin-login-wrap[hidden]{display:none!important}.admin-reactions{margin-top:14px;border-top:1px solid rgba(255,255,255,.08);padding-top:12px}.admin-reactions summary{cursor:pointer;color:#e8c75f;font-weight:700}.reaction-edit{display:grid;grid-template-columns:90px repeat(3,1fr);gap:8px;align-items:end;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)}.reaction-edit label{font-size:11px;color:#aaa}.reaction-edit .admin-input{padding:9px;margin-top:4px}@media(max-width:640px){.admin-grid{grid-template-columns:1fr}.admin-panel{padding:13px}.reaction-edit{grid-template-columns:1fr 1fr}.reaction-edit>b{grid-column:1/-1}.reaction-edit label:last-child{grid-column:1/-1}}
</style></head><body><main class="admin-shell"><div class="admin-wrap"><div class="admin-brand"><img src="assets/logo.png" alt="Gold Hunter"><div><h1>Forecast Admin</h1><p class="admin-note">Use your phone to update Forecast. Actual and Previous are read from official sources when supported.</p></div></div><section id="loginPanel" class="admin-panel admin-login-wrap"><div class="admin-login"><label class="admin-label">Admin PIN<input id="adminPin" class="admin-input" type="password" inputmode="numeric" autocomplete="current-password" placeholder="6-digit PIN"></label><button id="unlockAdmin" class="admin-button">Unlock</button><div id="loginStatus" class="admin-status"></div></div></section><section id="adminEditor" class="admin-editor" hidden><div class="admin-panel"><p class="admin-note">Only 4-star and 5-star Gold-related events are displayed. Forecast and unsupported Previous values are editable. Official Actual values remain locked.</p><div id="adminEvents"></div></div><div class="admin-actions"><button id="saveEvents" class="admin-button">Save Forecasts</button></div><div id="saveStatus" class="admin-status"></div></section><p><a href="/calendar.html" style="color:#e8c75f">View public calendar →</a></p></div></main><script src="admin.js"></script></body></html>
